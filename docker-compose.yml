version: '3.8'

services:
  backend:
    build: ./backend
    container_name: webamazee-lms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - webamazee-net

  frontend:
    build: ./frontend
    container_name: webamazee-lms-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - webamazee-net

volumes:
  backend_uploads:

networks:
  webamazee-net:
    driver: bridge
